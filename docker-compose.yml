services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_intel
      POSTGRES_USER: ai_intel
      POSTGRES_PASSWORD: ai_intel
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_intel -d ai_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://ai_intel:ai_intel@db:5432/ai_intel
      TZ: Asia/Shanghai
      # Set AI_INTEL_API_KEY in production only after the frontend/reverse proxy can attach it.
      # AI_INTEL_API_KEY: change-me
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pg_data:
